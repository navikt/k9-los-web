packages:
  - server

# Isolerer deploy til det spesifikke workspace-prosjektet (server), slik at
# `pnpm deploy` (uten --legacy) tar med kun serverens egne prod-dependencies.
injectWorkspacePackages: true

# Tilsvarer yarns `enableScripts: false`: vi kjører ingen postinstall/build-scripts.
# Pakkene under bygges bevisst ikke (binærene kommer via optional platform-deps).
ignoredBuiltDependencies:
  - '@sentry/cli'
  - core-js
  - esbuild
  - msw
  - unrs-resolver

# Ikke kjør `pnpm install` på nytt før hvert `pnpm run`-script.
# Registryet er token-gated, så en auto-reinstall ville kreve token ved hver kommando.
verifyDepsBeforeRun: false
