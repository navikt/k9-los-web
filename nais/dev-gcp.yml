ingresses:
  - "https://k9-los-web.intern.dev.nav.no"
azureTenant: trygdeetaten.no
outboundExternalHosts:
  - k9-los-api.dev-fss-pub.nais.io
proxyRedirects:
  - path: "/api/k9-los-api"
    scope: "api://dev-fss.k9saksbehandling.k9-los-api/.default"
    url: "https://k9-los-api.dev-fss-pub.nais.io"
    backendPath: "/api"
  - path: "/api/forvaltning"
    scope: "api://dev-fss.k9saksbehandling.k9-los-api/.default"
    url: "https://k9-los-api.dev-fss-pub.nais.io"
    backendPath: "/forvaltning"
  - path: "/api/endringslogg"
    url: "https://familie-endringslogg.intern.dev.nav.no"
resources:
  limits:
    memory: 200Mi
  requests:
    cpu: 10m
    memory: 100Mi
observability:
  autoInstrumentation:
    enabled: true
    runtime: nodejs
    destinations:
      - id: "grafana-lgtm"
  logging:
    destinations:
      - id: loki
      - id: elastic
