name: Build and deploy
on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENCE'

    branches:
      - master

jobs:
  build-and-deploy:
    name: Build docker image
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
    outputs:
      image: ${{ steps.docker-push.outputs.image }}
      image_version: ${{ steps.docker-push.outputs.tag }}
    steps:
      - name: Hente kode
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Sette opp pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.15.1
      - name: Sette opp Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: pnpm
      - name: Sette opp npm-auth mot GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Installere dependencies
        run: pnpm install --frozen-lockfile
      - name: Kompiler TypeScript
        run: pnpm run ts-check
      - name: Tester
        run: pnpm test --maxWorkers=2
      - name: Bygge kode
        run: pnpm build
      - name: Opprett release med Sentry
        run: pnpm sentry-release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        # Lager en selvstendig server-deploy med kun serverens prod-dependencies, da det er det eneste som trenger å være med på docker imaget.
        # node-linker=hoisted gir en flat node_modules uten symlenker, som kopieres rent inn i Docker (symlenker bryter BuildKit sin checksum-beregning).
      - name: Lag server-deploy
        run: |
          rm -rf ./deploy
          pnpm --filter=@k9-los-web/server --config.node-linker=hoisted deploy --prod ./deploy
          test -f ./deploy/server.js || { echo "::error ::deploy/server.js mangler"; exit 1; }
          test "$(find ./deploy -type l | wc -l)" -eq 0 || { echo "::error ::deploy inneholder symlenker"; exit 1; }
      - uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512 # v0
        id: docker-push
        with:
          tag: 'latest'
          team: k9saksbehandling

      - name: Deploy k9-los-web til dev
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        env:
          PRINT_PAYLOAD: true
          CLUSTER: dev-gcp
          IMAGE: ${{ steps.docker-push.outputs.image }}
          RESOURCE: nais/k9-los-web.yml
          VARS: nais/dev-gcp.yml

      - name: Tag commit with dev
        if: success()
        uses: navikt/sif-gha-workflows/.github/actions/create-or-update-tag@97a944ba12c0db588a29cfeed8a7dcb22e087d3f # v1.0.1
        with:
          tag: dev
          sha: ${{ github.sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}


  sif-code-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: navikt/sif-gha-workflows/.github/actions/sif-code-scan@97a944ba12c0db588a29cfeed8a7dcb22e087d3f # v1.0.1


  verdikjede-tester:
    name: Verdikjedetester
    needs: [build-and-deploy]
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      packages: read
    uses: navikt/sif-gha-workflows/.github/workflows/verdikjede-test-v2.yml@main
    with:
      suites: 'frontend-los'
      tag: ${{ needs.build-and-deploy.outputs.image_version}}
      image_version: ${{ needs.build-and-deploy.outputs.image_version}}

  compare-url-prod:
    name: Compare URL
    permissions:
      id-token: write
      contents: write
    if: github.ref_name == 'master'
    needs: [verdikjede-tester, build-and-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Compare URL
        id: compare
        uses: navikt/sif-gha-workflows/.github/actions/compare-commits@97a944ba12c0db588a29cfeed8a7dcb22e087d3f # v1.0.1
        with:
          base_commit: prod
          newest_commit: ${{ github.sha }}

  deploy-prod:
    name: Deploy prod
    permissions:
      id-token: write
      contents: write
    if: github.ref_name == 'master'
    environment: prod-gcp:k9saksbehandling
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Hente kode
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Deploy k9-los-web til prod
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        env:
          PRINT_PAYLOAD: true
          CLUSTER: prod-gcp
          IMAGE: ${{ needs.build-and-deploy.outputs.image }}
          RESOURCE: nais/k9-los-web.yml
          VARS: nais/prod-gcp.yml
      - name: Tag commit with prod
        uses: navikt/sif-gha-workflows/.github/actions/create-or-update-tag@97a944ba12c0db588a29cfeed8a7dcb22e087d3f # v1.0.1
        if: success()
        with:
          tag: prod
          sha: ${{ github.sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    needs: [build-and-deploy]
    uses: navikt/sif-gha-workflows/.github/workflows/trivy.yml@main
    permissions:
      contents: write
      id-token: write
      security-events: write
      actions: read
    secrets: inherit
    with:
      image: ${{ needs.build-and-deploy.outputs.image }}
      team: k9saksbehandling
